<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Phone body gradient: dark titanium chassis -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="50%" stop-color="#14141f"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
    <!-- Screen gradient: deep cobalt glow -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="40%" stop-color="#0d1a3a"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <!-- Blue cobalt accent glow -->
    <radialGradient id="glowGrad" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#1a6bff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a6bff" stop-opacity="0"/>
    </radialGradient>
    <!-- Camera lens gradient -->
    <radialGradient id="lensGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#020e26"/>
    </radialGradient>
    <!-- Titanium frame edge highlight -->
    <linearGradient id="frameEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a6a" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#2a2a3e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3a3a5a" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Screen inner glow overlay -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a6bff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a6bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow halo around phone -->
  <ellipse cx="32" cy="36" rx="20" ry="26" fill="url(#glowGrad)" opacity="0.5"/>

  <!-- Phone body / chassis -->
  <rect x="13" y="4" width="38" height="56" rx="9" ry="9" fill="url(#bodyGrad)"/>

  <!-- Frame highlight edge (left) -->
  <rect x="13" y="4" width="2" height="56" rx="2" fill="url(#frameEdge)" opacity="0.7"/>

  <!-- Frame highlight edge (top) -->
  <rect x="13" y="4" width="38" height="2" rx="2" fill="url(#frameEdge)" opacity="0.5"/>

  <!-- Screen bezel inset -->
  <rect x="16" y="9" width="32" height="46" rx="6" ry="6" fill="#08080f"/>

  <!-- Screen content area -->
  <rect x="17" y="10" width="30" height="44" rx="5.5" ry="5.5" fill="url(#screenGrad)"/>

  <!-- Screen inner glow -->
  <rect x="17" y="10" width="30" height="44" rx="5.5" ry="5.5" fill="url(#screenGlow)"/>

  <!-- Cosmic star cluster (small dots on screen for wallpaper feel) -->
  <circle cx="23" cy="20" r="0.6" fill="white" opacity="0.7"/>
  <circle cx="38" cy="16" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="41" cy="28" r="0.4" fill="white" opacity="0.6"/>
  <circle cx="20" cy="34" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="35" cy="38" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="26" cy="42" r="0.4" fill="white" opacity="0.6"/>
  <circle cx="43" cy="20" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="19" cy="22" r="0.4" fill="#7ab4ff" opacity="0.8"/>
  <circle cx="40" cy="44" r="0.5" fill="#7ab4ff" opacity="0.6"/>

  <!-- Blue nebula glow patch on screen -->
  <ellipse cx="30" cy="30" rx="9" ry="12" fill="#1a6bff" opacity="0.10"/>
  <ellipse cx="36" cy="26" rx="5" ry="7" fill="#6ab0ff" opacity="0.07"/>

  <!-- Subtle NOVA text on screen -->
  <text x="32" y="32" font-family="Arial, sans-serif" font-size="5" font-weight="900" fill="white" fill-opacity="0.18" text-anchor="middle" letter-spacing="2">NOVA</text>

  <!-- Cobalt blue accent line on screen (like a lock screen time indicator glow) -->
  <line x1="24" y1="36" x2="40" y2="36" stroke="#1a6bff" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="27" y1="38.5" x2="37" y2="38.5" stroke="#1a6bff" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Punch-hole selfie camera (centered at top of screen) -->
  <circle cx="32" cy="14" r="2.2" fill="#04040a"/>
  <circle cx="32" cy="14" r="1.4" fill="url(#lensGrad)"/>
  <!-- Camera lens reflection dot -->
  <circle cx="31.4" cy="13.4" r="0.35" fill="white" opacity="0.6"/>

  <!-- Home indicator bar (bottom) -->
  <rect x="27" y="50.5" width="10" height="1.5" rx="0.75" fill="white" opacity="0.25"/>

  <!-- Volume buttons (left side) -->
  <rect x="10.5" y="20" width="2.5" height="7" rx="1.25" fill="#3a3a5a"/>
  <rect x="10.5" y="29" width="2.5" height="5" rx="1.25" fill="#3a3a5a"/>

  <!-- Power button (right side) -->
  <rect x="51" y="22" width="2.5" height="9" rx="1.25" fill="#3a3a5a"/>

  <!-- Top speaker grille dots -->
  <circle cx="28.5" cy="7" r="0.8" fill="#0a0a12" opacity="0.8"/>
  <circle cx="32" cy="7" r="0.8" fill="#0a0a12" opacity="0.8"/>
  <circle cx="35.5" cy="7" r="0.8" fill="#0a0a12" opacity="0.8"/>

  <!-- Cobalt blue screen glow reflection at bottom edge -->
  <ellipse cx="32" cy="53.5" rx="8" ry="1.5" fill="#1a6bff" opacity="0.12"/>
</svg>
